name: "[Nova Furnishing] Weekly SEO Report"

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  send-seo-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Generate and send SEO report
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
          GSC_PROPERTY: sc-domain:novafurnishing.com
        run: python generate_report.py
